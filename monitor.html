<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<body style="background:#222; color:#fff; text-align:center">
  <video id="v" autoplay playsinline style="width:100%; height:300px; background:#000"></video>
  <button onclick="connect()" style="padding:20px; width:80%">HUBUNGKAN SEKARANG</button>
  <button onclick="document.getElementById('v').webkitSetPresentationMode('picture-in-picture')" style="padding:20px; width:80%; margin-top:10px">AKTIFKAN OVERLAY (PIP)</button>
  <script>
    const peer = new Peer();
    function connect() {
      const call = peer.call('ak124-target-hp', null);
      call.on('stream', s => { document.getElementById('v').srcObject = s; });
      call.on('error', e => { alert('Pacar belum buka app atau sinyal jelek'); });
    }
  </script>
</body>
